<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Story Horizontal - Template</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div
    class="video-container"
    id="video-container"
    data-composition-id="dynamic-story-horizontal"
    data-start="0"
    data-duration="68"
    data-width="1920"
    data-height="1080"
  >
    <div class="ambient-layer" aria-hidden="true">
      <span class="grid-line line-a"></span>
      <span class="grid-line line-b"></span>
      <span class="grid-line line-c"></span>
      <span class="scan-band band-a"></span>
      <span class="scan-band band-b"></span>
    </div>
    <div class="scene-stage" id="scene-stage"></div>
    <div class="progress-rail" aria-hidden="true">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <script src="vendor/gsap.min.js"></script>
  <script src="../shared/motion-core/duration.js"></script>
  <script src="../shared/motion-core/dom.js"></script>
  <script src="../shared/motion-core/animations.js"></script>
  <script src="../shared/motion-core/index.js"></script>
  <script src="script.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    if (!window.__timelines["dynamic-story-horizontal"]) {
      const dynamicStoryHorizontalBootstrapTl = gsap.timeline({ paused: true });
      dynamicStoryHorizontalBootstrapTl.to({}, { duration: 68 }, 0);
      window.__timelines["dynamic-story-horizontal"] = dynamicStoryHorizontalBootstrapTl;
    }
  </script>
</body>
</html>
